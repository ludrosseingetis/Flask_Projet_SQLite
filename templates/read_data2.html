<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            <td>{{ row['id_tache'] }}</td>
            <td>{{ row['titre'] }}</td>
            <td>{{ row['description'] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
