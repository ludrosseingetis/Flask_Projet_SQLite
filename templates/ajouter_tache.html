<form action="{{ url_for('ajouter_tache') }}" method="POST">
    <div style="margin-bottom: 10px;">
        <label>Titre de la tâche :</label><br>
        <input type="text" name="titre" required>
    </div>

    <div style="margin-bottom: 10px;">
        <label>Description :</label><br>
        <textarea name="description" required></textarea>
    </div>

    <div style="margin-bottom: 10px;">
        <label>ID du Client (existant) :</label><br>
        <input type="number" name="id_client" required>
    </div>

    <button type="submit">Enregistrer la tâche</button>
</form>
